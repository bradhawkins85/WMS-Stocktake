services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: wms-stocktake:latest
    container_name: wms-stocktake
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Path inside the container – the file lives on the named volume below.
      DATABASE_URL: "file:/data/production.db"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      DATAPEL_API_URL: "${DATAPEL_API_URL:-}"
      DATAPEL_API_KEY: "${DATAPEL_API_KEY:-}"
      NODE_ENV: production
    volumes:
      # Named volume persists the SQLite database across container restarts / upgrades.
      - db_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  db_data:
    driver: local
